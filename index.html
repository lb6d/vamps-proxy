<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Frame</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            position: relative;
        }
        #proxyForm {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }
        #proxyFrame {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
            position: relative;
            z-index: 1;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <form id="proxyForm">
        <label for="url">Enter URL:</label>
        <input type="text" id="url" required>
        <button type="submit">Go</button>
    </form>
    <div id="errorMessage" class="error"></div>
    <iframe id="proxyFrame"></iframe>

    <script>
        document.getElementById('proxyForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const url = document.getElementById('url').value;
            const errorMessage = document.getElementById('errorMessage');

            // Clear previous error messages
            errorMessage.textContent = '';

            if (!url) {
                errorMessage.textContent = 'Please enter a URL.';
                return;
            }

            // Basic URL validation
            try {
                new URL(url);
            } catch (_) {
                errorMessage.textContent = 'Invalid URL format.';
                return;
            }

            const proxyFrame = document.getElementById('proxyFrame');
            proxyFrame.src = url;
        });

        // Create stars
        function createStars(count) {
            const stars = [];
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = `${Math.random() * 2 + 1}px`;
                star.style.height = `${Math.random() * 2 + 1}px`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.animation = `moveStar ${Math.random() * 5 + 5}s linear infinite`;
                document.body.appendChild(star);
                stars.push(star);
            }
            return stars;
        }

        // Move stars away from mouse
        function moveStarsAwayFromMouse(stars) {
            document.addEventListener('mousemove', (event) => {
                stars.forEach(star => {
                    const rect = star.getBoundingClientRect();
                    const dx = event.clientX - (rect.left + rect.width / 2);
                    const dy = event.clientY - (rect.top + rect.height / 2);
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    star.style.transform = `translate(${distance * 0.1 * Math.cos(angle)}px, ${distance * 0.1 * Math.sin(angle)}px)`;
                });
            });
        }

        // Create and animate stars
        const stars = createStars(100);
        moveStarsAwayFromMouse(stars);
    </script>
</body>
</html>
